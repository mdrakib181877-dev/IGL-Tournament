<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Requests - RB Admin</title>
    <style>
        /* Modern Cyberpunk Admin Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0b0914; color: #ffffff; display: flex; min-height: 100vh; }
        
        .sidebar { width: 260px; background: #120e24; padding: 30px 20px; border-right: 1px solid rgba(255, 0, 85, 0.2); display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar h2 { color: #ff0055; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 40px; text-align: center; }
        .sidebar menu a { display: block; color: #aaa; text-decoration: none; padding: 12px 15px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; transition: 0.3s; }
        .sidebar menu a.active, .sidebar menu a:hover { background: rgba(255, 0, 85, 0.1); color: #ff0055; border-left: 4px solid #ff0055; }
        .logout-btn { background: #ff0055; color: #fff; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 26px; color: #ff0055; }

        .table-container { background: #120e24; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 20px; margin-bottom: 30px; overflow-x: auto; }
        .table-container h3 { color: #00ffcc; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #ff0055; text-transform: uppercase; font-size: 12px; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge.pending { background: rgba(255, 165, 0, 0.15); color: #ffa500; border: 1px solid #ffa500; }
        .badge.approved { background: rgba(0, 255, 204, 0.15); color: #00ffcc; border: 1px solid #00ffcc; }
        .badge.rejected { background: rgba(255, 0, 85, 0.15); color: #ff0055; border: 1px solid #ff0055; }
        
        .approve-btn { background: #00ffcc; color: #0b0914; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .reject-btn { background: #ff0055; color: #fff; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <h2>RB Admin Panel</h2>
            <menu style="margin-top: 20px;">
                <a href="admin-dashboard.html">Tournament & Config</a>
                <a href="admin-requests.html" class="active">Deposit & Users Requests</a>
            </menu>
        </div>
        <a href="#" class="logout-btn" id="admin-logout">Secure Log Out</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Requests Management</h1>
        </div>

        <div class="table-container">
            <h3>Deposit Requests</h3>
            <table>
                <thead><tr><th>Email</th><th>Method</th><th>Amount</th><th>Number</th><th>TxID</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="deposit-requests-table"></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>Withdraw Requests</h3>
            <table>
                <thead><tr><th>Email</th><th>Method</th><th>Amount</th><th>Number</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="withdraw-requests-table"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1T_3uG7GoQxUcACWzbiw63-i6S4rtGYA",
            databaseURL: "https://igl-tournament-f788f-default-rtdb.firebaseio.com",
            projectId: "igl-tournament-f788f"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // Load Deposits
        onValue(ref(database, 'deposit_requests'), (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('deposit-requests-table');
            body.innerHTML = '';
            for(let id in data) {
                let req = data[id];
                body.innerHTML += `<tr><td>${req.email}</td><td>${req.method}</td><td>${req.amount}</td><td>${req.sender}</td><td>${req.trxid}</td>
                <td><span class="badge ${req.status.toLowerCase()}">${req.status}</span></td>
                <td>${req.status === 'Pending' ? 
                    `<button class="approve-btn" onclick="approveDeposit('${id}','${req.userId}',${req.amount})">Approve</button>
                     <button class="reject-btn" onclick="rejectDeposit('${id}')">Reject</button>` 
                    : ''}</td></tr>`;
            }
        });

        // Load Withdraws
        onValue(ref(database, 'withdraw_requests'), (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('withdraw-requests-table');
            body.innerHTML = '';
            for(let id in data) {
                let req = data[id];
                body.innerHTML += `<tr><td>${req.email}</td><td>${req.method}</td><td>${req.amount}</td><td>${req.accountNumber}</td>
                <td><span class="badge ${req.status.toLowerCase()}">${req.status}</span></td>
                <td>${req.status === 'Pending' ? 
                    `<button class="approve-btn" onclick="approveWithdraw('${id}')">Complete</button>
                     <button class="reject-btn" onclick="rejectWithdraw('${id}','${req.userId}',${req.amount})">Reject</button>` 
                    : ''}</td></tr>`;
            }
        });

        window.approveDeposit = (id, userId, amount) => {
            runTransaction(ref(database, `users/${userId}/balance`), (b) => (b || 0) + amount);
            update(ref(database, `deposit_requests/${id}`), { status: 'Approved' });
        };

        window.rejectDeposit = (id) => {
            if(confirm("Are you sure you want to reject this deposit request?")) {
                update(ref(database, `deposit_requests/${id}`), { status: 'Rejected' });
                alert("Deposit request rejected!");
            }
        };

        window.approveWithdraw = (id) => {
            update(ref(database, `withdraw_requests/${id}`), { status: 'Approved' });
            alert("Withdrawal marked as completed!");
        };

        window.rejectWithdraw = (id, userId, amount) => {
            if(confirm("Are you sure you want to reject this? The balance will be refunded.")) {
                runTransaction(ref(database, `users/${userId}/balance`), (b) => (b || 0) + amount);
                update(ref(database, `withdraw_requests/${id}`), { status: 'Rejected' });
                alert("Withdrawal rejected and balance refunded!");
            }
        };

        document.getElementById('admin-logout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'admin-login.html');
        });
    </script>
</body>
</html>
