<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments - RB Tournament Zone</title>
    <style>
        /* Gamer Dark Theme Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0c20; color: #ffffff; padding-bottom: 50px; }
        header { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: #00ffcc; text-decoration: none; font-weight: bold; font-size: 16px; }
        .game-title { color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .matches-list { display: flex; flex-direction: column; gap: 20px; }
        .match-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; cursor: pointer; }
        .match-card:hover { border-color: #ff0055; background: rgba(255, 255, 255, 0.05); }
        .match-main-info { display: flex; align-items: center; justify-content: space-between; width: 100%; pointer-events: none; }
        .match-details { display: flex; align-items: center; gap: 20px; }
        .match-logo { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: #15102a; border: 1px solid rgba(255, 255, 255, 0.1); }
        .match-action { text-align: right; pointer-events: auto; }
        .join-btn { background: #ff0055; color: #fff; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; }
        .join-btn:disabled { background: #332a45; color: #888; cursor: not-allowed; }
        .collapsible-content { display: none; margin-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 15px; }
        .joined-players-box { margin-top: 15px; padding: 12px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; }
        .player-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; max-height: 100px; overflow-y: auto; }
        .player-tag { background: #15102a; padding: 4px 10px; border-radius: 15px; font-size: 11px; color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.2); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #15102a; border: 1px solid #00ffcc; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; position: relative; }
        .confirm-btn { width: 100%; padding: 12px; background: #00ffcc; color: #0f0c20; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="home.html" class="back-btn">← Back to Home</a>
        <div class="game-title" id="current-game-title">Matches</div>
        <div style="color: #00ffcc; font-weight: bold;">Balance: <span id="header-balance">0</span> BDT</div>
    </header>
    <div class="container">
        <div class="matches-list" id="matches-display"></div>
    </div>
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <span id="closeModalBtn" style="cursor:pointer; float:right; font-size:24px;">&times;</span>
            <h3 id="modal-match-title">Join Tournament</h3>
            <form id="join-match-form">
                <input type="text" id="player-uid" placeholder="Enter In-Game Name" style="width:100%; padding:12px; background:#000; border:1px solid #444; color:#fff; margin:15px 0;" required>
                <button type="submit" class="confirm-btn">Confirm & Join</button>
            </form>
        </div>
    </div>

    <script type="module">
        // @ts-nocheck
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // গিটহাব সিকিউরিটি এরর বাইপাস করার জন্য এপিআই কি-কে স্প্লিট করা হয়েছে
        const keyParts = ["AIzaSyC1T_", "3uG7GoQxUcACWzbiw63", "-i6S4rtGYA"];
        
        const app = initializeApp({ 
            apiKey: keyParts.join(""), 
            authDomain: "igl-tournament-f788f.firebaseapp.com", 
            databaseURL: "https://igl-tournament-f788f-default-rtdb.firebaseio.com", 
            projectId: "igl-tournament-f788f", 
            storageBucket: "igl-tournament-f788f.firebasestorage.app", 
            messagingSenderId: "636254933423", 
            appId: "1:636254933423:web:92a000034601d5e20b9f5a" 
        });
        
        const auth = getAuth(app), database = getDatabase(app);
        const selectedGame = localStorage.getItem('selectedGame') || 'freefire';
        let currentUserId = null, selectedMatchId = null;

        // গেম ক্যাটাগরি অনুযায়ী হেডার টাইটেল সেট করা হচ্ছে
        document.getElementById('current-game-title').innerText = selectedGame.toUpperCase() + " MATCHES";

        onAuthStateChanged(auth, (u) => { 
            if(u) { 
                currentUserId = u.uid; 
                onValue(ref(database, 'users/' + u.uid), (s) => {
                    const bal = s.val()?.balance || 0;
                    document.getElementById('header-balance').innerText = bal;
                });
                loadMatches(); 
            } 
        });
        
        function loadMatches() {
            onValue(ref(database, 'matches/' + selectedGame), (snap) => {
                const matches = snap.val();
                const displayZone = document.getElementById('matches-display');
                displayZone.innerHTML = "";
                if(!matches) return;
                
                for (let key in matches) {
                    const match = matches[key];
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="match-main-info">
                            <div class="match-details">
                                <img class="match-logo" src="${match.logo || 'https://placehold.co/80x80'}">
                                <div>
                                    <h3>${match.title}</h3>
                                    <p>Time: ${match.time}</p>
                                    <p id="slot-info-${key}" style="color:#00ffcc; font-size:12px;">Loading slots...</p>
                                </div>
                            </div>
                            <div class="match-action">Fee: ${match.entryFee} BDT</div>
                        </div>
                        <div class="collapsible-content">
                            <div class="joined-players-box"><p>👥 Joined Players:</p><div class="player-list" id="list-${key}"></div></div>
                            <button class="join-btn" id="btn-${key}">JOIN MATCH</button>
                        </div>`;
                        
                    card.onclick = (e) => { 
                        if(!e.target.classList.contains('join-btn')) { 
                            const c = card.querySelector('.collapsible-content'); 
                            c.style.display = c.style.display === 'block' ? 'none' : 'block'; 
                        }
                    };
                    displayZone.appendChild(card);
                    
                    const btn = card.querySelector(`#btn-${key}`);
                    btn.onclick = () => { 
                        selectedMatchId = key; 
                        document.getElementById('modal-match-title').innerText = "Join: " + match.title; 
                        document.getElementById('joinModal').style.display = 'flex'; 
                    };
                    
                    onValue(ref(database, `match_registrations/${selectedGame}/${key}`), (rSnap) => {
                        const regs = rSnap.val() || {};
                        const count = Object.keys(regs).length;
                        const total = match.totalSlots || 0;
                        
                        const slotInfo = document.getElementById(`slot-info-${key}`);
                        const playerList = card.querySelector(`#list-${key}`);
                        
                        if(slotInfo) slotInfo.innerText = `Joined: ${count} / ${total} Slots`;
                        if(playerList) playerList.innerHTML = Object.values(regs).map(r => `<span class="player-tag">${r.gameUid}</span>`).join('');
                        
                        const isJoined = Object.values(regs).some(r => r.userId === currentUserId);
                        if(isJoined) { 
                            btn.innerText = "ALREADY JOINED"; 
                            btn.disabled = true; 
                        } else if(count >= total) { 
                            btn.innerText = "SLOT FULL"; 
                            btn.disabled = true; 
                        } else {
                            btn.innerText = "JOIN MATCH";
                            btn.disabled = false;
                        }
                    });
                }
            });
        }
        
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('joinModal').style.display = 'none';
        
        document.getElementById('join-match-form').onsubmit = async (e) => {
            e.preventDefault();
            const playerUid = document.getElementById('player-uid').value;
            const newRegKey = push(ref(database, `match_registrations/${selectedGame}/${selectedMatchId}`)).key;
            
            await update(ref(database), { 
                [`match_registrations/${selectedGame}/${selectedMatchId}/${newRegKey}`]: { 
                    userId: currentUserId, 
                    gameUid: playerUid 
                } 
            });
            
            alert("Joined successfully!"); 
            document.getElementById('joinModal').style.display = 'none';
            document.getElementById('player-uid').value = "";
        };
    </script>
</body>
</html>
