<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules - IGL Tournament</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0c20; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1a1535; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; border: 1px solid #00ffcc; }
        h2 { color: #00ffcc; margin-bottom: 20px; text-align: center; }
        .rules-content { font-size: 16px; line-height: 1.6; color: #ddd; margin-bottom: 20px; }
        .rules-content ul { margin-left: 20px; margin-top: 10px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #ff0055; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Tournament Rules</h2>
        <div class="rules-content">
            <ul>
                <li>Rule 1: সব খেলোয়াড়কে অবশ্যই সময়মতো উপস্থিত থাকতে হবে।</li>
                <li>Rule 2: কোনো প্রকার হ্যাকিং বা চিটিং করা যাবে না।</li>
                <li>Rule 3: জয় পরাজয় মেনে নিতে হবে।</li>
                <li>Rule 4: কোনো গালিগালাজ বা খারাপ ব্যবহার গ্রহণযোগ্য নয়।</li>
                <li>Rule 5: অ্যাডমিন সিদ্ধান্ত চূড়ান্ত বলে গণ্য হবে।</li>
            </ul>
        </div>
        <a href="home.html" class="back-link">Back to Home</a>
    </div>

</body>
</html>
