<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RB Tournament Zone - Welcome</title>
    <style>
        body { 
            background: #0f0c20; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .box { 
            background: #15102a; 
            border: 2px solid #00ffcc; 
            padding: 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .btn { 
            display: block; 
            margin-bottom: 15px; 
            padding: 15px; 
            text-decoration: none; 
            color: #fff; 
            font-weight: bold; 
            border-radius: 10px; 
            transition: 0.3s; 
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        .skip-btn { 
            background: transparent; 
            color: #aaa; 
            border: 1px solid #aaa; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#00ffcc; margin-bottom:10px;">RB Tournament Zone</h2>
        <p style="color:#aaa; font-size:14px; margin-bottom:25px;">Stay connected for match updates!</p>
        
        <a href="https://t.me/your_telegram_channel" class="btn" style="background:#0088cc;">Join Telegram</a>
        <a href="https://t.me/your_proof_group" class="btn" style="background:#28a745;">Withdrawal Proof</a>
        <a href="https://youtube.com/your_tutorial" class="btn" style="background:#ff0000;">Tutorial</a>
        <a href="https://t.me/your_support_group" class="btn" style="background:#f39c12;">Support Group</a>
        
        <button class="skip-btn" onclick="window.location.href='index.html'">Enter App</button>
    </div>
</body>
</html>
