<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IGL Tournament Zone</title>
    <style>
        /* Gamer Dark Theme Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0c20; color: #ffffff; padding-bottom: 30px; }

        /* 1. Scrolling Notice Bar */
        .notice-container { background: #ff0055; color: #fff; white-space: nowrap; overflow: hidden; box-shadow: 0 2px 10px rgba(255, 0, 85, 0.4); padding: 10px 0; font-weight: bold; font-size: 15px; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Header & Navbar */
        header { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #00ffcc; font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .nav-buttons a { color: #fff; text-decoration: none; margin-left: 10px; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 15px; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        .nav-buttons a.results-nav { border-color: #ffcc00; color: #ffcc00; }
        .nav-buttons a.results-nav:hover { background: #ffcc00; color: #0f0c20; }
        .nav-buttons a.logout-nav:hover { background: #ff0055; border-color: #ff0055; }

        /* User Profile & Wallet Section */
        .user-panel { max-width: 1200px; margin: 30px auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .welcome-msg h2 { font-size: 20px; color: #aaaaaa; }
        .welcome-msg span { color: #00ffcc; font-weight: bold; }
        .wallet-box { text-align: right; }
        .balance { font-size: 24px; font-weight: bold; color: #00ffcc; margin-bottom: 10px; }
        .deposit-btn { background: #00ffcc; color: #0f0c20; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        .deposit-btn:hover { background: #00ccaa; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }

        /* 2. Categories Grid */
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 24px; color: #fff; margin-bottom: 20px; border-left: 4px solid #00ffcc; padding-left: 10px; text-transform: uppercase; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .game-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; overflow: hidden; text-align: center; transition: transform 0.3s, border-color 0.3s; cursor: pointer; }
        .game-card:hover { transform: translateY(-5px); border-color: #00ffcc; }
        .game-card img { width: 100%; height: 180px; object-fit: cover; background: #1a1535; }
        .game-card h3 { padding: 15px 0; font-size: 18px; letter-spacing: 1px; background: rgba(0, 0, 0, 0.4); color: #fff; }

        /* Music Toggle Button */
        #music-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 999; background: #00ffcc; border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 10px rgba(0,255,204,0.5); color: #0f0c20; }
        
        .support-wrapper { max-width: 1200px; margin: 40px auto 10px auto; padding: 0 20px; text-align: center; }
        .support-btn { display: inline-block; width: 100%; max-width: 450px; padding: 14px; background: rgba(0, 255, 204, 0.05); border: 1px solid #00ffcc; color: #00ffcc; text-align: center; text-decoration: none; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .support-btn:hover { background: #00ffcc; color: #0f0c20; }
    </style>
</head>
<body>

    <div class="notice-container">
        <div class="notice-text" id="live-notice">স্বাগতম IGL টুর্নামেন্ট জোনে! পেমেন্ট করার ৫ মিনিটের মধ্যে ব্যালেন্স অ্যাড হয়ে যাবে।</div>
    </div>

    <header>
        <div class="logo">IGL Tournament Zone</div>
        <div class="nav-buttons">
            <a href="results.html" class="results-nav">Match Results 🏆</a>
            <a href="#" id="logout-btn" class="logout-nav">Log Out</a>
        </div>
    </header>

    <div class="user-panel">
        <div class="welcome-msg">
            <h2>Welcome Back, <span id="user-name">Gamer</span>!</h2>
            <p style="color: #888; font-size: 14px; margin-top: 5px;">ID: <span id="user-id">Loading...</span></p>
        </div>
        <div class="wallet-box">
            <div class="balance">Balance: <span id="user-balance">0</span> BDT</div>
            <a href="deposit.html" class="deposit-btn">Deposit Money</a>
        </div>
    </div>

    <div class="main-container">
        <h2 class="section-title">Select Game Category</h2>
        <div class="grid-container">
            <div class="game-card" onclick="goToGame('freefire')"><img id="img-freefire" src="https://placehold.co/400x250/1a1535/00ffcc?text=Free+Fire"><h3 id="title-freefire">Free Fire</h3></div>
            <div class="game-card" onclick="goToGame('pubg')"><img id="img-pubg" src="https://placehold.co/400x250/1a1535/00ffcc?text=PUBG+Mobile"><h3 id="title-pubg">PUBG Mobile</h3></div>
            <div class="game-card" onclick="goToGame('ludo')"><img id="img-ludo" src="https://placehold.co/400x250/1a1535/00ffcc?text=Ludo"><h3 id="title-ludo">Ludo</h3></div>
            <div class="game-card" onclick="goToGame('efootball')"><img id="img-efootball" src="https://placehold.co/400x250/1a1535/00ffcc?text=eFootball"><h3 id="title-efootball">eFootball</h3></div>
        </div>
    </div>

    <div class="support-wrapper">
        <a href="https://wa.me/8801806803773" target="_blank" class="support-btn">💬 Contact Admin Live Support</a>
    </div>

    <!-- Music Player -->
    <audio id="bg-music" loop><source src="" type="audio/mpeg"></audio>
    <button id="music-toggle">🎵 Music: OFF</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1T_3uG7GoQxUcACWzbiw63-i6S4rtGYA",
            authDomain: "igl-tournament-f788f.firebaseapp.com",
            databaseURL: "https://igl-tournament-f788f-default-rtdb.firebaseio.com",
            projectId: "igl-tournament-f788f",
            storageBucket: "igl-tournament-f788f.firebasestorage.app",
            messagingSenderId: "636254933423",
            appId: "1:636254933423:web:92a000034601d5e20b9f5a",
            measurementId: "G-9EL1JQM2E4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // Music Logic
        const audio = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');
        onValue(ref(database, 'admin_settings/music/home'), (snapshot) => { if(snapshot.val()) audio.src = snapshot.val(); });
        musicBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); musicBtn.innerText = "🎵 Music: ON"; } 
            else { audio.pause(); musicBtn.innerText = "🎵 Music: OFF"; }
        });

        // App Data Load
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(database, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('user-name').innerText = data.username || data.fullName;
                        document.getElementById('user-balance').innerText = data.balance;
                        document.getElementById('user-id').innerText = user.uid.substring(0, 8) + '...';
                    }
                });
            } else { window.location.href = 'index.html'; }
        });

        onValue(ref(database, 'admin_settings/'), (snapshot) => {
            const settings = snapshot.val();
            if(settings) {
                if(settings.notice) document.getElementById('live-notice').innerText = settings.notice;
                if(settings.categories) {
                    const cats = settings.categories;
                    ['freefire', 'pubg', 'ludo', 'efootball'].forEach(g => {
                        if(cats[g]) {
                            if(cats[g].image) document.getElementById('img-'+g).src = cats[g].image;
                            if(cats[g].title) document.getElementById('title-'+g).innerText = cats[g].title;
                        }
                    });
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); signOut(auth).then(() => window.location.href = 'index.html'); });
    </script>
    <script> function goToGame(gameName) { localStorage.setItem('selectedGame', gameName); window.location.href = 'game-matches.html'; } </script>
</body>
</html>
