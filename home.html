<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IGL Tournament Zone</title>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f0c20; color: #ffffff; padding-bottom: 30px; }

        header { background: rgba(255, 255, 255, 0.03); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .logo { color: #00ffcc; font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .nav-buttons { display: flex; flex-direction: column; width: 100%; max-width: 300px; gap: 10px; }
        .nav-buttons a { color: #fff; text-decoration: none; padding: 10px; border: 1px solid #ffffff33; border-radius: 5px; text-align: center; display: block; font-weight: bold; }

        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .game-card { background: #1a1535; border: 1px solid #ffffff1a; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .game-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .game-card h3 { padding: 15px; text-align: center; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">IGL Tournament Zone</div>
        <div class="nav-buttons">
            <a href="results.html">Results 🏆</a>
            <a href="rules.html">Rules 📜</a>
            <a href="#" id="logout-btn">Log Out</a>
        </div>
    </header>

    <div class="main-container">
        <div class="grid-container">
            <div class="game-card" onclick="goToGame('freefire')">
                <img id="img-freefire" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="FF">
                <h3 id="title-freefire">Free Fire</h3>
            </div>
            <div class="game-card" onclick="goToGame('pubg')">
                <img id="img-pubg" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="PUBG">
                <h3 id="title-pubg">PUBG Mobile</h3>
            </div>
            <div class="game-card" onclick="goToGame('ludo')">
                <img id="img-ludo" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="Ludo">
                <h3 id="title-ludo">Ludo</h3>
            </div>
            <div class="game-card" onclick="goToGame('efootball')">
                <img id="img-efootball" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="eFootball">
                <h3 id="title-efootball">eFootball</h3>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // ডাটাবেজ থেকে ডাটা নিয়ে ইমেজ আপডেট করার ফাংশন
        onValue(ref(database, 'admin_settings/categories'), (snapshot) => {
            const cats = snapshot.val();
            if (cats) {
                Object.keys(cats).forEach(key => {
                    const imgElement = document.getElementById('img-' + key);
                    if (imgElement && cats[key].image) {
                        imgElement.src = cats[key].image; // সরাসরি লিংক বসিয়ে দিচ্ছি
                    }
                    const titleElement = document.getElementById('title-' + key);
                    if (titleElement && cats[key].title) {
                        titleElement.innerText = cats[key].title;
                    }
                });
            }
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.href = 'index.html');
    </script>
    <script>
        function goToGame(game) { localStorage.setItem('selectedGame', game); location.href = 'game-matches.html'; }
    </script>
</body>
</html>
