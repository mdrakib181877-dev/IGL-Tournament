<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IGL Tournament Zone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0c20; color: #ffffff; padding-bottom: 30px; }

        /* Notice Bar */
        .notice-container { background: #ff0055; color: #fff; white-space: nowrap; overflow: hidden; box-shadow: 0 2px 10px rgba(255, 0, 85, 0.4); padding: 10px 0; font-weight: bold; font-size: 15px; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Header */
        header { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .logo { color: #00ffcc; font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .nav-buttons { display: flex; flex-direction: column; width: 100%; max-width: 300px; gap: 10px; }
        .nav-buttons a { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.3); padding: 10px; border-radius: 5px; transition: 0.3s; font-weight: bold; text-align: center; display: block; }
        .nav-buttons a.rules-nav { border-color: #00ffcc; color: #00ffcc; }
        .nav-buttons a.rules-nav:hover { background: #00ffcc; color: #0f0c20; }
        .nav-buttons a.results-nav { border-color: #ffcc00; color: #ffcc00; }
        .nav-buttons a.results-nav:hover { background: #ffcc00; color: #0f0c20; }
        .nav-buttons a.logout-nav:hover { background: #ff0055; border-color: #ff0055; }

        /* User Panel */
        .user-panel { max-width: 1200px; margin: 30px auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .wallet-box { text-align: right; }
        .balance { font-size: 20px; font-weight: bold; color: #00ffcc; margin-bottom: 10px; }
        .deposit-btn, .withdraw-btn { padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .deposit-btn { background: #00ffcc; color: #0f0c20; }
        .withdraw-btn { background: #ff0055; color: #fff; margin-right: 5px; }

        /* Categories Grid */
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 24px; color: #fff; margin-bottom: 20px; border-left: 4px solid #00ffcc; padding-left: 10px; text-transform: uppercase; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; overflow: hidden; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: #00ffcc; }
        .game-card img { width: 100%; height: 180px; object-fit: cover; background: #1a1535; display: block; }
        .game-card h3 { padding: 15px 0; color: #fff; background: rgba(0,0,0,0.4); }

        .support-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .support-btn { display: inline-block; width: 100%; max-width: 450px; padding: 14px; border: 1px solid #00ffcc; color: #00ffcc; text-decoration: none; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="notice-container">
        <div class="notice-text" id="live-notice">স্বাগতম IGL টুর্নামেন্ট জোনে!</div>
    </div>

    <header>
        <div class="logo">IGL Tournament Zone</div>
        <div class="nav-buttons">
            <a href="results.html" class="results-nav">Results 🏆</a>
            <a href="rules.html" class="rules-nav">Rules 📜</a>
            <a href="#" id="logout-btn" class="logout-nav">Log Out</a>
        </div>
    </header>

    <div class="user-panel">
        <div>
            <h2>Welcome, <span id="user-name">Gamer</span>!</h2>
        </div>
        <div class="wallet-box">
            <div class="balance">Balance: <span id="user-balance">0</span> BDT</div>
            <a href="withdraw.html" class="withdraw-btn">Withdraw</a>
            <a href="deposit.html" class="deposit-btn">Deposit</a>
        </div>
    </div>

    <div class="main-container">
        <h2 class="section-title">Select Game Category</h2>
        <div class="grid-container">
            <div class="game-card" onclick="goToGame('freefire')">
                <img id="img-freefire" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="FF">
                <h3 id="title-freefire">Free Fire</h3>
            </div>
            <div class="game-card" onclick="goToGame('pubg')">
                <img id="img-pubg" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="PUBG">
                <h3 id="title-pubg">PUBG Mobile</h3>
            </div>
            <div class="game-card" onclick="goToGame('ludo')">
                <img id="img-ludo" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="Ludo">
                <h3 id="title-ludo">Ludo</h3>
            </div>
            <div class="game-card" onclick="goToGame('efootball')">
                <img id="img-efootball" src="https://placehold.co/400x250/1a1535/00ffcc?text=Loading..." alt="eFootball">
                <h3 id="title-efootball">eFootball</h3>
            </div>
        </div>
    </div>

    <div class="support-wrapper">
        <a href="https://wa.me/8801806803773" target="_blank" class="support-btn">💬 Contact Admin Live Support</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // ইউজার ডাটা
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(database, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('user-name').innerText = data.username || "Gamer";
                        document.getElementById('user-balance').innerText = data.balance || 0;
                    }
                });
            } else { window.location.href = 'index.html'; }
        });

        // ইমপ্রুভড ইমেজ লোডার
        function updateCategory(id, data) {
            const img = document.getElementById(`img-${id}`);
            const title = document.getElementById(`title-${id}`);
            if(data.image) {
                img.src = data.image;
                img.onerror = function() { this.src = "https://placehold.co/400x250/1a1535/00ffcc?text=Link+Error"; };
            }
            if(data.title) title.innerText = data.title;
        }

        // সেটিংস লোড
        onValue(ref(database, 'admin_settings/'), (snapshot) => {
            const settings = snapshot.val();
            if(!settings) return;
            if(settings.notice) document.getElementById('live-notice').innerText = settings.notice;
            if(settings.categories) {
                ['freefire', 'pubg', 'ludo', 'efootball'].forEach(cat => {
                    if(settings.categories[cat]) updateCategory(cat, settings.categories[cat]);
                });
            }
        });

        document.getElementById('logout-btn').onclick = (e) => { e.preventDefault(); signOut(auth).then(() => window.location.href = 'index.html'); };
    </script>
    <script>
        function goToGame(gameName) { localStorage.setItem('selectedGame', gameName); window.location.href = 'game-matches.html'; }
    </script>
</body>
</html>
