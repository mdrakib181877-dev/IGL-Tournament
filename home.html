<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IGL Tournament Zone</title>
    <style>
        /* আগের স্টাইলগুলো ঠিক থাকবে */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0c20; color: #ffffff; padding-bottom: 30px; }
        .notice-container { background: #ff0055; color: #fff; white-space: nowrap; overflow: hidden; box-shadow: 0 2px 10px rgba(255, 0, 85, 0.4); padding: 10px 0; font-weight: bold; font-size: 15px; }
        .notice-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        header { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #00ffcc; font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .nav-buttons a { color: #fff; text-decoration: none; margin-left: 10px; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 15px; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        .user-panel { max-width: 1200px; margin: 30px auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .wallet-box { text-align: right; }
        .balance { font-size: 24px; font-weight: bold; color: #00ffcc; margin-bottom: 10px; }
        .deposit-btn { background: #00ffcc; color: #0f0c20; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .game-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; overflow: hidden; text-align: center; cursor: pointer; }
        .game-card img { width: 100%; height: 180px; object-fit: cover; }
        .game-card h3 { padding: 15px 0; font-size: 18px; background: rgba(0, 0, 0, 0.4); }
        
        /* Start Sound Overlay */
        #sound-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .play-btn { padding: 20px 40px; font-size: 20px; background: #00ffcc; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #0f0c20; }
    </style>
</head>
<body>

    <!-- Overlay for Autoplay -->
    <div id="sound-overlay">
        <button class="play-btn" onclick="startExperience()">🔊 START GAME MUSIC</button>
    </div>

    <!-- YouTube Container -->
    <div id="youtube-player" style="display:none;"></div>

    <div class="notice-container"><div class="notice-text" id="live-notice">স্বাগতম IGL টুর্নামেন্ট জোনে!</div></div>

    <header>
        <div class="logo">IGL Tournament Zone</div>
        <div class="nav-buttons">
            <a href="results.html">Match Results 🏆</a>
            <a href="#" id="logout-btn">Log Out</a>
        </div>
    </header>

    <div class="user-panel">
        <div class="welcome-msg"><h2>Welcome Back, <span id="user-name">Gamer</span>!</h2></div>
        <div class="wallet-box">
            <div class="balance">Balance: <span id="user-balance">0</span> BDT</div>
            <a href="deposit.html" class="deposit-btn">Deposit Money</a>
        </div>
    </div>

    <div class="main-container">
        <div class="grid-container">
            <div class="game-card" onclick="goToGame('freefire')"><img id="img-freefire" src=""><h3 id="title-freefire">Free Fire</h3></div>
            <div class="game-card" onclick="goToGame('pubg')"><img id="img-pubg" src=""><h3 id="title-pubg">PUBG Mobile</h3></div>
            <div class="game-card" onclick="goToGame('ludo')"><img id="img-ludo" src=""><h3 id="title-ludo">Ludo</h3></div>
            <div class="game-card" onclick="goToGame('efootball')"><img id="img-efootball" src=""><h3 id="title-efootball">eFootball</h3></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const app = initializeApp({/* Your Config */});
        const database = getDatabase(app);
        const auth = getAuth(app);

        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            onValue(ref(database, 'admin_settings/music/home'), (snapshot) => {
                const url = snapshot.val();
                if (url) {
                    const videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                    if (!player) {
                        player = new YT.Player('youtube-player', {
                            videoId: videoId,
                            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': videoId }
                        });
                    } else { player.loadVideoById(videoId); }
                }
            });
        };

        window.startExperience = () => {
            document.getElementById('sound-overlay').style.display = 'none';
            if (player) player.playVideo();
        };

        // ... (বাকি আগের জাভাস্ক্রিপ্ট কোডগুলো এখানে বসিয়ে নিন)
    </script>
</body>
</html>
