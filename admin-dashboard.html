<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RB Tournament Zone</title>
    <style>
        /* Modern Cyberpunk Admin Dashboard Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0b0914; color: #ffffff; display: flex; min-height: 100vh; }
        
        .sidebar { width: 260px; background: #120e24; padding: 30px 20px; border-right: 1px solid rgba(255, 0, 85, 0.2); }
        .sidebar h2 { color: #ff0055; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 40px; text-align: center; }
        .sidebar menu a { display: block; color: #aaa; text-decoration: none; padding: 12px 15px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; transition: 0.3s; }
        .sidebar menu a.active, .sidebar menu a:hover { background: rgba(255, 0, 85, 0.1); color: #ff0055; border-left: 4px solid #ff0055; }
        .logout-btn { background: #ff0055; color: #fff; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; display: block; margin-top: 50px; }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; }
        .panel-card { background: #120e24; border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 12px; }
        .panel-card h3 { color: #00ffcc; margin-bottom: 20px; font-size: 18px; border-left: 3px solid #00ffcc; padding-left: 10px; text-transform: uppercase; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #ccc; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; }
        .music-row-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { width: 100%; padding: 12px; background: #00ffcc; color: #0b0914; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .action-btn:hover { background: #00ccaa; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>RB Admin Panel</h2>
        <menu>
            <a href="admin-dashboard.html" class="active">Tournament & Config</a>
            <a href="admin-requests.html">Deposit & Users Requests</a>
        </menu>
        <a href="#" class="logout-btn" id="admin-logout">Secure Log Out</a>
    </div>

    <div class="main-content">
        <div class="admin-grid">
            <!-- Music Management -->
            <div class="panel-card" style="grid-column: span 2;">
                <h3>🎵 Background Music Settings (YouTube Links)</h3>
                <form id="music-config-form">
                    <div class="music-row-group">
                        <div class="form-group"><label>Home Page Music</label><input type="url" id="music-home" placeholder="YouTube URL"></div>
                        <div class="form-group"><label>Free Fire Music</label><input type="url" id="music-freefire" placeholder="YouTube URL"></div>
                        <div class="form-group"><label>PUBG Music</label><input type="url" id="music-pubg" placeholder="YouTube URL"></div>
                        <div class="form-group"><label>eFootball Music</label><input type="url" id="music-efootball" placeholder="YouTube URL"></div>
                    </div>
                    <button type="submit" class="action-btn">Update All Music Links</button>
                </form>
            </div>

            <!-- Notice Board -->
            <div class="panel-card">
                <h3>Live Notice Board</h3>
                <form id="notice-form">
                    <div class="form-group"><textarea id="app-notice" rows="3"></textarea></div>
                    <button type="submit" class="action-btn" style="background:#ff0055; color:#fff;">Update Notice</button>
                </form>
            </div>
            
            <!-- Category Update -->
            <div class="panel-card">
                <h3>Category Settings</h3>
                <form id="category-config-form">
                    <div class="form-group"><select id="config-game-select"><option value="freefire">Free Fire</option><option value="pubg">PUBG Mobile</option><option value="ludo">Ludo</option><option value="efootball">eFootball</option></select></div>
                    <div class="form-group"><input type="text" id="config-game-title" placeholder="Title"></div>
                    <div class="form-group"><input type="url" id="config-game-img" placeholder="Image URL"></div>
                    <button type="submit" class="action-btn">Update Category</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1T_3uG7GoQxUcACWzbiw63-i6S4rtGYA",
            authDomain: "igl-tournament-f788f.firebaseapp.com",
            databaseURL: "https://igl-tournament-f788f-default-rtdb.firebaseio.com",
            projectId: "igl-tournament-f788f",
            storageBucket: "igl-tournament-f788f.firebasestorage.app",
            messagingSenderId: "636254933423",
            appId: "1:636254933423:web:92a000034601d5e20b9f5a",
            measurementId: "G-9EL1JQM2E4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // Music Save Logic
        document.getElementById('music-config-form').addEventListener('submit', (e) => {
            e.preventDefault();
            update(ref(database, 'admin_settings/music'), {
                home: document.getElementById('music-home').value,
                freefire: document.getElementById('music-freefire').value,
                pubg: document.getElementById('music-pubg').value,
                efootball: document.getElementById('music-efootball').value
            }).then(() => alert("Music Links Updated!"));
        });

        // Load current data
        onValue(ref(database, 'admin_settings/music'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('music-home').value = data.home || "";
                document.getElementById('music-freefire').value = data.freefire || "";
                document.getElementById('music-pubg').value = data.pubg || "";
                document.getElementById('music-efootball').value = data.efootball || "";
            }
        });
        
        // Log out logic
        document.getElementById('admin-logout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'admin-login.html');
        });
    </script>
</body>
</html>
