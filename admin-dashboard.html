<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RB Tournament Zone</title>
    <style>
        /* Modern Cyberpunk Admin Dashboard Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0b0914; color: #ffffff; display: flex; min-height: 100vh; }
        
        /* Sidebar Styling */
        .sidebar { width: 260px; background: #120e24; padding: 30px 20px; border-right: 1px solid rgba(255, 0, 85, 0.2); display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar h2 { color: #ff0055; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 40px; text-align: center; }
        .sidebar menu a { display: block; color: #aaa; text-decoration: none; padding: 12px 15px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; transition: 0.3s; }
        .sidebar menu a.active, .sidebar menu a:hover { background: rgba(255, 0, 85, 0.1); color: #ff0055; border-left: 4px solid #ff0055; }
        .logout-btn { background: #ff0055; color: #fff; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        
        /* Main Panel Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 30px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; }
        .panel-card { background: #120e24; border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 12px; }
        .panel-card h3 { color: #00ffcc; margin-bottom: 20px; font-size: 18px; border-left: 3px solid #00ffcc; padding-left: 10px; text-transform: uppercase; }
        
        /* Form & Table */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #ccc; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; }
        .action-btn { width: 100%; padding: 12px; background: #00ffcc; color: #0b0914; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .match-table { width: 100%; border-collapse: collapse; margin-top: 15px; color: #fff; }
        .match-table th { color: #ff0055; padding: 12px; }
        .match-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-manage { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; margin: 2px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <h2>RB Admin Panel</h2>
            <menu><a href="#" class="active">Tournament & Config</a><a href="#">Requests</a></menu>
        </div>
        <a href="#" class="logout-btn" id="admin-logout">Log Out</a>
    </div>

    <div class="main-content">
        <div class="header"><h1>Dashboard Control Center</h1></div>

        <div class="admin-grid">
            <div class="panel-card" style="grid-column: span 2;">
                <h3>Create New Tournament</h3>
                <form id="match-launch-form">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <select id="match-game"><option value="freefire">Free Fire</option><option value="pubg">PUBG</option></select>
                        <input type="text" id="match-mode" placeholder="Mode (e.g. Squad)" required>
                    </div>
                    <input type="text" id="match-title" placeholder="Match Title" required>
                    <input type="text" id="match-time" placeholder="Time" required>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <input type="number" id="match-fee" placeholder="Fee">
                        <input type="number" id="match-prize" placeholder="Prize">
                        <input type="number" id="match-perkill" placeholder="Per Kill">
                    </div>
                    <button type="submit" class="action-btn">Launch Match</button>
                </form>
            </div>

            <div class="panel-card" style="grid-column: span 2;">
                <h3>Live Match Management</h3>
                <table class="match-table">
                    <thead><tr><th>Title</th><th>Room ID / Pass</th><th>Actions</th></tr></thead>
                    <tbody id="live-match-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // আপনার Firebase কনফিগ বসান
        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // ম্যাচ লঞ্চ লজিক
        document.getElementById('match-launch-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const game = document.getElementById('match-game').value;
            set(push(ref(database, `matches/${game}`)), {
                title: document.getElementById('match-title').value,
                mode: document.getElementById('match-mode').value,
                time: document.getElementById('match-time').value,
                entryFee: document.getElementById('match-fee').value,
                prize: document.getElementById('match-prize').value,
                perKill: document.getElementById('match-perkill').value,
                roomId: "Not Set", roomPass: "Not Set"
            }).then(() => alert("Match Launched!"));
        });

        // লাইভ টেবিল লোড করা
        onValue(ref(database, 'matches'), (snap) => {
            const list = document.getElementById('live-match-list');
            list.innerHTML = "";
            const matches = snap.val();
            for (let game in matches) {
                for (let id in matches[game]) {
                    const m = matches[game][id];
                    list.innerHTML += `<tr>
                        <td>${m.title}</td>
                        <td>
                            <input id="rid-${id}" value="${m.roomId}" style="width:80px; padding:2px;">
                            <input id="rp-${id}" value="${m.roomPass}" style="width:80px; padding:2px;">
                        </td>
                        <td>
                            <button class="btn-manage" style="background:#00ffcc" onclick="updateRoom('${game}', '${id}')">Save</button>
                            <button class="btn-manage" style="background:#ff0055; color:white" onclick="deleteMatch('${game}', '${id}')">Del</button>
                        </td>
                    </tr>`;
                }
            }
        });

        // আপডেট ও ডিলিট
        window.updateRoom = (g, id) => {
            update(ref(database, `matches/${g}/${id}`), {
                roomId: document.getElementById(`rid-${id}`).value,
                roomPass: document.getElementById(`rp-${id}`).value
            }).then(() => alert("Updated!"));
        };
        window.deleteMatch = (g, id) => { if(confirm("Confirm Delete?")) remove(ref(database, `matches/${g}/${id}`)); };
    </script>
</body>
</html>
